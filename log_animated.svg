  <!-- Flask border -->
  <path d="M103 82 H227 V274 Q165 339 103 274 Z" stroke="rgba(255,255,255,0.85)" stroke-width="8" stroke-linejoin="round"/>

  <!-- Top opening accents -->
  <line x1="119" y1="82" x2="154" y2="82" stroke="rgba(255,255,255,0.85)" stroke-width="8" stroke-linecap="round"/>
  <line x1="176" y1="82" x2="211" y2="82" stroke="rgba(255,255,255,0.85)" stroke-width="8" stroke-linecap="round"/>

  <!-- Green top circle -->
  <circle cx="165" cy="34" r="18" fill="#26B371"/>

  <!-- Green bar -->
  <path d="M85 61 H245 V84 M85 61 V84" stroke="#26B371" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
